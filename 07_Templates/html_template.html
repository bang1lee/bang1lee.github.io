<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프로젝트 제목</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      background: #f8f9fa;
      color: #333;
    }
    header {
      background: #1a1a2e;
      color: white;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    main {
      max-width: 1100px;
      margin: 3rem auto;
      padding: 0 1.5rem;
    }
    .hero {
      text-align: center;
      padding: 4rem 0;
    }
    .hero h1 { font-size: 2.5rem; margin-bottom: 1rem; }
    .hero p  { font-size: 1.1rem; color: #666; }
    .btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      background: #4f46e5;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
    }
    footer {
      text-align: center;
      padding: 2rem;
      color: #aaa;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">🚀 My Project</div>
    <nav>
      <a href="#" style="color:white; text-decoration:none; margin-left:1.5rem;">홈</a>
      <a href="#" style="color:white; text-decoration:none; margin-left:1.5rem;">소개</a>
      <a href="#" style="color:white; text-decoration:none; margin-left:1.5rem;">연락처</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1>바이브코딩으로 만든 홈페이지</h1>
      <p>AI와 함께 빠르게 만드는 웹사이트 템플릿입니다.</p>
      <a href="#" class="btn">시작하기</a>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 My Project. All rights reserved.</p>
  </footer>
</body>
</html>
